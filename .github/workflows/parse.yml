name: Parse VLESS Keys

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  parse:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: install deps
        run: pip install aiohttp

      - name: install xray
        run: |
          LATEST=$(curl -s "https://api.github.com/repos/XTLS/Xray-core/releases/latest" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            | grep '"tag_name"' | head -1 | cut -d'"' -f4)
          echo "Latest xray: ${LATEST}"
          curl -fsSL -o /tmp/xray.zip \
            "https://github.com/XTLS/Xray-core/releases/download/${LATEST}/Xray-linux-64.zip"
          mkdir -p /tmp/xray_extract
          unzip -q /tmp/xray.zip -d /tmp/xray_extract
          cp /tmp/xray_extract/xray /usr/local/bin/xray
          chmod +x /usr/local/bin/xray
          xray version

      - name: run parser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          XRAY_BIN: /usr/local/bin/xray
          BOOTSTRAP_KEY: ${{ secrets.BOOTSTRAP_KEY }}
        run: python search_vless.py

      - name: commit results
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add filtered_vless_keys.txt clash.yaml
          git commit -m "auto-update $(date '+%Y-%m-%d %H:%M')" || echo "no changes"
          git push --force-with-lease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
